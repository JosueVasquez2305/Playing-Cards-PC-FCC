<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left red">A♦</div>
      <div class="middle red">♦</div>
      <div class="right red">A♦</div>
    </div>
    <div class="card">
      <div class="left">K♠</div>
      <div class="middle">♠</div>
      <div class="right">K♠</div>
    </div>
    <div class="card">
      <div class="left">J♣</div>
      <div class="middle">♣</div>
      <div class="right">J♣</div>
    </div>
    <div class="card red">
      <div class="left red">Q♥</div>
      <div class="middle red">♥</div>
      <div class="right  red">Q♥</div>
    </div>
  </main>

</body>

</html>
